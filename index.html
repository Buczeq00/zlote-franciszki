<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Złote Franciszki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const CATEGORIES = [
        {
          id: 1,
          name: '🎮 Gamer Moment / Clutch roku',
          clips: [
            {
              id: 'g1',
              title: 'Harry Pioter 1v5 na bicie',
              ytId: 'dQw4w9WgXcQ',
            },
            {
              id: 'g2',
              title: 'Walter (Mr_łosoś) ace w rundzie eco',
              ytId: 'dQw4w9WgXcQ',
            },
            { id: 'g3', title: 'Fuks życia na midzie', ytId: 'dQw4w9WgXcQ' },
            { id: 'g4', title: 'Niezwykły skok z dachu', ytId: 'dQw4w9WgXcQ' },
            { id: 'g5', title: 'Szybka akcja z nożem', ytId: 'dQw4w9WgXcQ' },
          ],
        },
        {
          id: 2,
          name: '🤪 Największa Odklejka / Fail',
          clips: [
            {
              id: 'f1',
              title: 'Kiedy zapomnisz wyciszyć mikrofonu',
              ytId: 'dQw4w9WgXcQ',
            },
            {
              id: 'f2',
              title: 'Skok do wody, którego nie było',
              ytId: 'dQw4w9WgXcQ',
            },
            { id: 'f3', title: 'Krzyki o 3 rano', ytId: 'dQw4w9WgXcQ' },
            {
              id: 'f4',
              title: 'Przegrana walka z grawitacją',
              ytId: 'dQw4w9WgXcQ',
            },
            { id: 'f5', title: 'Zły flash pod nogi', ytId: 'dQw4w9WgXcQ' },
          ],
        },
      ];

      function App() {
        const [page, setPage] = React.useState('home');
        const [currentCategoryIndex, setCurrentCategoryIndex] =
          React.useState(0);
        const [votes, setVotes] = React.useState({});

        const currentCategory = CATEGORIES[currentCategoryIndex];

        const handleSelectClip = (clipId) => {
          setVotes({ ...votes, [currentCategory.id]: clipId });
        };

        const nextCategory = () => {
          if (currentCategoryIndex < CATEGORIES.length - 1) {
            setCurrentCategoryIndex(currentCategoryIndex + 1);
          }
        };

        const prevCategory = () => {
          if (currentCategoryIndex > 0) {
            setCurrentCategoryIndex(currentCategoryIndex - 1);
          }
        };

        return (
          <div className="min-h-screen bg-indigo-950 bg-[linear-gradient(to_right,#312e81_1px,transparent_1px),linear-gradient(to_bottom,#312e81_1px,transparent_1px)] bg-[size:4rem_4rem] text-white font-sans antialiased">
            {page === 'home' && (
              <div className="flex flex-col items-center justify-center min-h-screen text-center px-4">
                <h1 className="text-6xl md:text-8xl font-black tracking-tighter uppercase drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] text-transparent bg-clip-text bg-gradient-to-b from-amber-300 via-amber-500 to-yellow-600 animate-pulse">
                  Złote Franciszki
                </h1>
                <p className="mt-4 text-xl text-indigo-200 max-w-md font-medium tracking-wide">
                  Plebiscyt na najlepsze momenty roku z naszej ekipy na DC!
                </p>
                <button
                  onClick={() => setPage('voting')}
                  className="mt-12 px-8 py-4 bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-black text-xl rounded-xl shadow-[0_0_30px_rgba(245,158,11,0.3)] hover:shadow-[0_0_40px_rgba(245,158,11,0.6)] hover:scale-105 transition-all duration-300 uppercase tracking-widest border border-yellow-400"
                >
                  Przejdź do głosowania
                </button>
              </div>
            )}

            {page === 'voting' && (
              <div className="max-w-6xl mx-auto p-6 min-h-screen flex flex-col justify-between">
                <header className="flex flex-col md:flex-row justify-between items-center border-b border-indigo-900 pb-6 mb-8 gap-4">
                  <div>
                    <span className="text-xs font-bold uppercase tracking-widest text-amber-400">
                      Kategoria {currentCategoryIndex + 1} z {CATEGORIES.length}
                    </span>
                    <h2 className="text-3xl font-black text-white mt-1">
                      {currentCategory.name}
                    </h2>
                  </div>
                  <button
                    onClick={() => {
                      setPage('home');
                      setCurrentCategoryIndex(0);
                    }}
                    className="text-sm font-semibold text-indigo-300 hover:text-white transition"
                  >
                    ⬅ Powrót do menu głównego
                  </button>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                  {currentCategory.clips.map((clip) => {
                    const isSelected = votes[currentCategory.id] === clip.id;
                    return (
                      <div
                        key={clip.id}
                        className={`bg-indigo-950/80 backdrop-blur-md border rounded-2xl overflow-hidden flex flex-col justify-between transition duration-300 ${
                          isSelected
                            ? 'border-amber-400 ring-2 ring-amber-400/50 shadow-lg shadow-amber-500/10'
                            : 'border-indigo-900 hover:border-indigo-700'
                        }`}
                      >
                        <div className="p-4 border-b border-indigo-900 bg-indigo-900/20">
                          <h3 className="font-bold text-lg truncate text-indigo-100">
                            {clip.title}
                          </h3>
                        </div>

                        <div className="aspect-video w-full bg-black">
                          <iframe
                            className="w-full h-full"
                            src={`https://www.youtube.com/embed/${clip.ytId}`}
                            title={clip.title}
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowFullScreen
                          ></iframe>
                        </div>

                        <button
                          onClick={() => handleSelectClip(clip.id)}
                          className={`w-full py-3.5 font-bold text-sm transition tracking-wider uppercase ${
                            isSelected
                              ? 'bg-amber-500 text-slate-950 font-black'
                              : 'bg-indigo-900/50 hover:bg-indigo-800 text-indigo-200 hover:text-white'
                          }`}
                        >
                          {isSelected ? '⭐ Wybrany klip' : 'Wybierz ten klip'}
                        </button>
                      </div>
                    );
                  })}
                </div>

                <footer className="border-t border-indigo-900 pt-6 mt-auto flex justify-between items-center">
                  <button
                    onClick={prevCategory}
                    disabled={currentCategoryIndex === 0}
                    className={`px-6 py-3 rounded-xl font-bold transition flex items-center gap-2 ${
                      currentCategoryIndex === 0
                        ? 'bg-indigo-950 text-indigo-800 border border-indigo-900/50 cursor-not-allowed'
                        : 'bg-indigo-900 hover:bg-indigo-800 text-white border border-indigo-700'
                    }`}
                  >
                    ⬅ Poprzednia kategoria
                  </button>

                  <div className="text-sm font-medium text-indigo-300">
                    {votes[currentCategory.id] ? (
                      <span className="text-emerald-400 font-bold">
                        ✓ Głos oddany
                      </span>
                    ) : (
                      <span className="text-amber-400 animate-pulse">
                        Wybierz film, aby przejść dalej
                      </span>
                    )}
                  </div>

                  <button
                    onClick={nextCategory}
                    disabled={
                      currentCategoryIndex === CATEGORIES.length - 1 ||
                      !votes[currentCategory.id]
                    }
                    className={`px-6 py-3 rounded-xl font-bold transition flex items-center gap-2 ${
                      currentCategoryIndex === CATEGORIES.length - 1 ||
                      !votes[currentCategory.id]
                        ? 'bg-indigo-950 text-indigo-800 border border-indigo-900/50 cursor-not-allowed'
                        : 'bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-black shadow-md shadow-amber-500/10'
                    }`}
                  >
                    Następna kategoria ➡
                  </button>
                </footer>
              </div>
            )}
          </div>
        );
      }

      const root = BradleyDOM.createRoot(document.getElementById('root'));
      const ReactDOM = window.ReactDOM;
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
